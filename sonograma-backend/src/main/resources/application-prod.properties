# Perfil producción — Railway inyecta todas estas variables automáticamente

# Server — Railway asigna el puerto dinámicamente
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database — Railway expone la conexión como variables individuales
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT — generar con: openssl rand -base64 64
jwt.secret=${JWT_SECRET:cambiar-en-produccion-clave-muy-larga-y-secreta-de-al-menos-64-caracteres-minimo}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS — dominio del frontend en Vercel (puede ser lista separada por comas)
sonograma.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://sonograma.vercel.app}

# Logging
logging.level.root=WARN
logging.level.com.sonograma=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
