# ============================================================
#  Sonograma – Perfil PRODUCCIÓN (Lightsail)
#  NO subir con valores hardcodeados. Variables desde entorno.
# ============================================================

# --- Servidor ----------------------------------------------------------------
server.port=8080
server.servlet.context-path=/api
spring.mvc.async.request-timeout=600000

# --- Base de datos -----------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sonograma_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- JWT ---------------------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- CORS / Frontend ---------------------------------------------------------
# CorsConfig.java lee sonograma.cors.allowed-origins
sonograma.cors.allowed-origins=${SONOGRAMA_FRONTEND_BASE_URL:https://tudominio.com}
# QRService.java usa sonograma.frontend.base-url para construir URLs de QR
sonograma.frontend.base-url=${SONOGRAMA_FRONTEND_BASE_URL:https://tudominio.com}

# --- Parámetros comerciales --------------------------------------------------
sonograma.ventas.impuesto-porcentaje=${SONOGRAMA_VENTAS_IMPUESTO_PORCENTAJE:0}
sonograma.ventas.otros-costos=${SONOGRAMA_VENTAS_OTROS_COSTOS:0}

# --- VinylFuture scraping ----------------------------------------------------
sonograma.vinylfuture.delay-ms=400
sonograma.vinylfuture.timeout-ms=10000

# --- Discogs API (opcional) --------------------------------------------------
discogs.api.token=${DISCOGS_TOKEN:}
discogs.api.request-delay-ms=${DISCOGS_REQUEST_DELAY_MS:350}

# --- Actuator ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.server.port=8080

# --- Logs --------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.sonograma=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.file.name=/opt/sonograma/logs/backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
