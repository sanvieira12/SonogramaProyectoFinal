# Server config
server.port=8080
server.servlet.context-path=/api

# Active profile — Railway sobreescribe con SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sonograma_db

spring.datasource.username=sonograma_user
spring.datasource.password=sonograma_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (secret debe tener minimo 32 caracteres para HS256)
jwt.secret=SonogramaJWTSecretKeyDesarrollo2026!
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.sonograma=DEBUG
logging.level.com.sonograma.security=DEBUG

spring.application.name=sonograma-backend

# Configuración comercial inicial. En una versión futura puede migrarse a tabla editable.
sonograma.frontend.base-url=${SONOGRAMA_FRONTEND_BASE_URL:http://localhost:5173}
sonograma.ventas.impuesto-porcentaje=${SONOGRAMA_VENTAS_IMPUESTO_PORCENTAJE:0}
sonograma.ventas.otros-costos=${SONOGRAMA_VENTAS_OTROS_COSTOS:0}

# VinylFuture scraping config
sonograma.vinylfuture.delay-ms=400
sonograma.vinylfuture.timeout-ms=10000

# Discogs API — token optional, increases rate limit from 60 to 240 req/min
discogs.api.token=${DISCOGS_TOKEN:}
discogs.api.request-delay-ms=${DISCOGS_REQUEST_DELAY_MS:350}
discogs.api.max-retries=${DISCOGS_MAX_RETRIES:3}
discogs.covers.directory=${DISCOGS_COVERS_DIRECTORY:./data/discogs-covers}

# Actuator (healthcheck para Railway)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
