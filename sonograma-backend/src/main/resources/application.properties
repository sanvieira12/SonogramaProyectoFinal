# Server config
server.port=8080
server.servlet.context-path=/api

# Active profile
spring.profiles.active=prod

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sonograma_db

spring.datasource.username=sonograma_user
spring.datasource.password=sonograma_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (secret debe tener minimo 32 caracteres para HS256)
jwt.secret=SonogramaJWTSecretKeyDesarrollo2026!
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.sonograma=DEBUG
logging.level.com.sonograma.security=DEBUG

spring.application.name=sonograma-backend
